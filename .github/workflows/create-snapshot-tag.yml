name: Create Snapshot Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: Base semantic version in format X.Y.Z
        required: true
        type: string

jobs:
  create-snapshot-tag:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate input version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Input version must match X.Y.Z using digits only."
            exit 1
          fi

      - name: Determine new snapshot tag
        id: new_tag
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          DATETIME="$(date -u +%Y%m%d%H%M)"
          TAG="${VERSION}.${DATETIME}-SNAPSHOT"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Tag '${TAG}' already exists locally."
            exit 1
          fi

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "::error::Tag '${TAG}' already exists on origin."
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push snapshot tag
        shell: bash
        run: |
          git tag "${{ steps.new_tag.outputs.tag }}"
          git push origin "refs/tags/${{ steps.new_tag.outputs.tag }}"

      - name: Trigger release workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "release.yml",
              ref: "${{ steps.new_tag.outputs.tag }}"
            });
