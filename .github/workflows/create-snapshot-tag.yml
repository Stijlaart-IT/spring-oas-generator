name: Create Snapshot Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: Base semantic version in format X.Y.Z
        required: true
        type: string

jobs:
  create-snapshot-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push snapshot tag
        run: ./scripts/create-snapshot.sh "${{ github.event.inputs.version }}"
