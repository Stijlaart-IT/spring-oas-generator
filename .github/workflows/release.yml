name: Create GitHub Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"

          if [[ -z "$TAG" ]]; then
            echo "::error::No tag provided."
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.ref_type }}" != "tag" ]]; then
            echo "::error::workflow_dispatch must be started from a tag ref, got ref '${{ github.ref }}' with type '${{ github.ref_type }}'."
            exit 1
          fi

          if [[ "$TAG" == *-SNAPSHOT ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        shell: bash
        run: |
          git rev-parse "refs/tags/${{ steps.tag.outputs.tag }}" >/dev/null
          git checkout "refs/tags/${{ steps.tag.outputs.tag }}"

      - name: Set up Java 21 + Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set version from release tag
        run: mvn versions:set -DnewVersion=${{ steps.tag.outputs.tag }}

      - name: Run tests
        run: mvn -B -ntp verify

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: spring-oas-generator-cli/target/spring-oas-generator-cli-*.jar

      - name: Trigger deployment workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "maven-central-deploy.yml",
              ref: "${{ github.ref_name }}"
            });
