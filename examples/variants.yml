openapi: 3.0.2
info:
  title: Variants Example
  version: 0.0.0
paths:
  /inline-request-body:
    put:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                  - itemName
                properties:
                  itemName:
                    type: string
      responses:
        "204":
          description: No Content
  /inline-response-body:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
          description: "Ok"
components:
  schemas:
    RequiredAndNullable:
      type: object
      required:
        - requiredNullable
        - requiredNonNullable
      properties:
        requiredNullable:
          type: string
          nullable: true
        requiredNonNullable:
          type: string
        optionalNullable:
          type: string
          nullable: true
        optionalNonNullable:
          type: string
    AdditionalPropertiesWithOtherProperties:
      type: object
      properties:
        name:
          type: string
      required:
        - name
      additionalProperties: true
    AdditionalPropertiesEmptyObject:
      type: object
      additionalProperties: {}
    AdditionalPropertiesTrue:
      type: object
      additionalProperties: true
    ObjectWithRefToPrimitive:
      type: object
      properties:
        key:
          $ref: "#/components/schemas/PrimitiveKey"
      required:
        - key
    PrimitiveKey:
      type: integer
    AllOfTwoObjects:
      allOf:
        - $ref: "#/components/schemas/AllOfFirstObject"
        - $ref: "#/components/schemas/AllOfSecondObject"
    AllOfFirstObject:
      type: object
      properties:
        name2:
          type: string
      required:
        - name2
    AllOfSecondObject:
      type: object
      properties:
        age:
          type: integer
      required:
        - age
    MixedAllOf:
        allOf:
          - type: number
          - type: integer
